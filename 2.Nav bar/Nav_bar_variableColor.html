<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            
        }
        :root{
            --textcolor:red;
            --seccolor:rgb(201, 255, 189);
            --backgrd:rgb(20, 163, 7);
        }
        .box{
            border: 1px solid black;
            height: 50px;
            background-color: var(--seccolor);
            color: var(--textcolor);
            padding: 10px;
        }

        
        ul li{
            
            list-style: none;
            display: inline;
            padding: 20px;
            font-weight: bolder;
        }
        ul li a{
            text-decoration: none;
            font-family: 'poppins',sans-serif;
            color: aliceblue;
        }

        nav{ 
            /* display: inline-block;  */
            padding: 20px;  
            background-color: var(--backgrd);
        }
        body{
            background-color: var(--seccolor);
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">Main</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Contact Us</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
